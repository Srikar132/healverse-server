spring.application.name=healverse

# H2 in-memory database for local development
spring.datasource.url=jdbc:h2:mem:devdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# Server
server.port=8080

# Spring Security
spring.security.user.name=srikar
spring.security.user.password=123
server.servlet.session.cookie.same-site=strict

# Voice Chat Configuration
voice.chat.max-session-duration=3600000
voice.chat.max-audio-size=10485760
voice.chat.supported-formats=wav,mp3,webm
voice.chat.default-voice=default
voice.chat.emergency-alert=true

# AI Service Configuration (placeholder - configure with actual API keys)
# spring.ai.openai.api-key=your-openai-api-key
# voice.chat.stt.provider=openai
# voice.chat.tts.provider=openai